name: Release

# Triggered on a version tag push (e.g. v0.1.0). Builds binaries for the
# major platforms, packages them, and creates a GitHub Release with the
# archives attached. Also uploads the install script and a checksum file.
#
# The matrix is split by runner image because cross-compiling between
# OS families is fragile and slow — running each target on its native
# runner image is faster and more reliable.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-x64-gnu:
    name: Linux (x86_64, glibc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu --locked
      - name: Package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/x86_64-unknown-linux-gnu/release/commitai" "commitai-v${VERSION}-x86_64-unknown-linux-gnu"
          tar -czf "commitai-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" "commitai-v${VERSION}-x86_64-unknown-linux-gnu"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-gnu
          path: '*.tar.gz'

  linux-x64-musl:
    name: Linux (x86_64, musl static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl --locked
      - name: Package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/x86_64-unknown-linux-musl/release/commitai" "commitai-v${VERSION}-x86_64-unknown-linux-musl"
          tar -czf "commitai-v${VERSION}-x86_64-unknown-linux-musl.tar.gz" "commitai-v${VERSION}-x86_64-unknown-linux-musl"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-musl
          path: '*.tar.gz'

  linux-arm64:
    name: Linux (aarch64, musl static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl + aarch64 cross tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        # musl cross-compile: explicit compiler + flags
        run: |
          cargo build --release \
            --target aarch64-unknown-linux-musl \
            --locked
      - name: Package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/aarch64-unknown-linux-musl/release/commitai" "commitai-v${VERSION}-aarch64-unknown-linux-musl"
          tar -czf "commitai-v${VERSION}-aarch64-unknown-linux-musl.tar.gz" "commitai-v${VERSION}-aarch64-unknown-linux-musl"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: '*.tar.gz'

  macos-x64:
    name: macOS (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin --locked
      - name: Package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/x86_64-apple-darwin/release/commitai" "commitai-v${VERSION}-x86_64-apple-darwin"
          tar -czf "commitai-v${VERSION}-x86_64-apple-darwin.tar.gz" "commitai-v${VERSION}-x86_64-apple-darwin"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: '*.tar.gz'

  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin --locked
      - name: Package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/aarch64-apple-darwin/release/commitai" "commitai-v${VERSION}-aarch64-apple-darwin"
          tar -czf "commitai-v${VERSION}-aarch64-apple-darwin.tar.gz" "commitai-v${VERSION}-aarch64-apple-darwin"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: '*.tar.gz'

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            target -> ./
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc --locked
      - name: Package
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mv "target/x86_64-pc-windows-msvc/release/commitai.exe" "commitai-v${VERSION}-x86_64-pc-windows-msvc.exe"
          7z a "commitai-v${VERSION}-x86_64-pc-windows-msvc.zip" "commitai-v${VERSION}-x86_64-pc-windows-msvc.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: '*.zip'

  release:
    name: Publish GitHub Release
    needs:
      - linux-x64-gnu
      - linux-x64-musl
      - linux-arm64
      - macos-x64
      - macos-arm64
      - windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten and checksum
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release/*
